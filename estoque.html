<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque | Cacau Show</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="CSSs/adm.css">
    <link rel="stylesheet" href="CSSs/estoque.css">
</head>
<body>
    <div class="container">
       
        <nav class="sidebar">
            <div class="sidebar-top">
                <div class="nav-menu">
                    <a href="adm.html" class="nav-link"><i class="ph ph-squares-four"></i></a>
                    <a href="estoque.html" class="nav-link active"><i class="ph ph-package"></i></a>
                    <a href="#" class="nav-link"><i class="ph ph-users"></i></a>
                </div>
            </div>
            <div class="sidebar-bottom">
                <a href="#" class="nav-link"><i class="ph ph-gear"></i></a>
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Admin" class="avatar">
            </div>
        </nav>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <h1>Controle de Estoque</h1>
                    <p class="label">Gerencie seus produtos e insumos</p>
                </div>
                <div class="header-right">
                    <button class="btn-primary"><i class="ph ph-plus"></i> Novo Produto</button>
                </div>
            </header>

            <div class="inventory-grid">
               
                <div class="inventory-stats">
                    <div class="stat-item card">
                        <i class="ph ph-package"></i>
                        <div>
                            <span>Total de Itens</span>
                            <strong>1.240</strong>
                        </div>
                    </div>
                    <div class="stat-item card alert">
                        <i class="ph ph-warning-circle"></i>
                        <div>
                            <span>Estoque Baixo</span>
                            <strong>12</strong>
                        </div>
                    </div>
                </div>

         
                <section class="card inventory-card">
                    <div class="card-header">
                        <div class="search-bar inventory-search">
                            <i class="ph ph-magnifying-glass"></i>
                            <input type="text" placeholder="Filtrar produtos...">
                        </div>
                    </div>
                    
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>Produto</th>
                                <th>Categoria</th>
                                <th>Preço</th>
                                <th>Quantidade</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="product-cell">
                                    <img src="https://placehold.co/40x40/3C2415/FFF?text=L" alt="">
                                    <strong>LaCreme ao Leite 100g</strong>
                                </td>
                                <td>Tabletes</td>
                                <td>R$ 15,90</td>
                                <td>450 un</td>
                                <td><span class="stock-tag high">Em dia</span></td>
                                <td><button class="btn-icon"><i class="ph ph-dots-three-outline"></i></button></td>
                            </tr>
                            <tr>
                                <td class="product-cell">
                                    <img src="https://placehold.co/40x40/C09552/FFF?text=T" alt="">
                                    <strong>Trufa Artesanal Maracujá</strong>
                                </td>
                                <td>Trufas</td>
                                <td>R$ 4,50</td>
                                <td>15 un</td>
                                <td><span class="stock-tag low">Crítico</span></td>
                                <td><button class="btn-icon"><i class="ph ph-dots-three-outline"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </section>
            </div>
        </main>
    </div>
</body>
</html>
